name: Update Profile SVG

on:
  schedule:
    - cron: '0 2 * * *'   # runs daily at 02:00 UTC
  push:
    branches: [main]
    paths: [generate_final.py]  # also regenerate when script itself changes
  workflow_dispatch:           # manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate profile.svg
        run: python generate_final.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile.svg
          git diff --cached --quiet || git commit -m "auto: update profile.svg (star counts refreshed)"
          git push
